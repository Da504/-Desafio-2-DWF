spring.application.name=Desafio-2-DWF

# Configuraciµn de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_escolar?useSSL=false&serverTimezone=America/El_Salvador&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuraciµn de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Configuraciµn del puerto del servidor
server.port=8080

# Configuraciµn de Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
